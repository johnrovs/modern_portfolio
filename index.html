<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="John Rommel Rovero — Software Developer & Full Stack Engineer specializing in Java, Spring Boot, React and MySQL. View projects, experience and download resume." />
    <meta name="theme-color" content="#0F172A" />

    <!-- Open Graph -->
    <meta property="og:title" content="John Rommel Rovero | Software Developer" />
    <meta property="og:description" content="Full Stack Developer building scalable web applications with Java, Spring Boot, React & MySQL." />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>John Doe | Software Developer</title>

    <!--
      Runs before anything else renders so the correct theme class is on
      <html> before the stylesheet paints — otherwise a returning visitor
      who picked "light" would see a flash of the dark theme first.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          if (stored === 'light') {
            document.documentElement.classList.add('light')
          }
        } catch (e) {
          // localStorage unavailable — falls back to the default dark theme.
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
